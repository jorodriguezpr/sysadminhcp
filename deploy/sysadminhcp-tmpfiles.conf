# SysAdminHCP tmpfiles.d configuration
# Install to: /etc/tmpfiles.d/sysadminhcp.conf
# Ensures runtime directories are created on boot

d /var/run/sysadminhcp     0755 sysadminhcp sysadminhcp -
d /var/log/sysadminhcp     0755 sysadminhcp sysadminhcp -
d /var/tmp/sysadminhcp     0755 sysadminhcp sysadminhcp 7d
d /var/cache/sysadminhcp   0755 sysadminhcp sysadminhcp -